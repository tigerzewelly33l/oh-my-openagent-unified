name: Discord Push Notification

on:
  push:
    branches:
      - main
      - develop
  pull_request:
    types: [opened, reopened, closed]

jobs:
  notify-discord:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Get commit info
        id: commit_info
        run: |
          COMMIT_MESSAGE=$(git log -1 --pretty=%B | head -n 1)
          COMMIT_AUTHOR=$(git log -1 --pretty=%an)
          COMMIT_HASH=$(git log -1 --pretty=%h)
          COMMIT_URL="${{ github.event.repository.html_url }}/commit/${{ github.sha }}"
          BRANCH_NAME="${{ github.ref_name }}"

          echo "message=${COMMIT_MESSAGE}" >> $GITHUB_OUTPUT
          echo "author=${COMMIT_AUTHOR}" >> $GITHUB_OUTPUT
          echo "hash=${COMMIT_HASH}" >> $GITHUB_OUTPUT
          echo "url=${COMMIT_URL}" >> $GITHUB_OUTPUT
          echo "branch=${BRANCH_NAME}" >> $GITHUB_OUTPUT

      - name: Get changed files
        id: changed_files
        run: |
          FILES_CHANGED=$(git diff --name-only HEAD~1..HEAD | wc -l)
          FILES_LIST=$(git diff --name-only HEAD~1..HEAD | head -5 | paste -sd',' - | sed 's/,/\n/g' | sed 's/^/• /')

          echo "count=${FILES_CHANGED}" >> $GITHUB_OUTPUT
          echo "list<<EOF" >> $GITHUB_OUTPUT
          echo "${FILES_LIST}" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: Notify Discord (Push)
        if: github.event_name == 'push'
        uses: actions/github-script@v7
        env:
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            if (!process.env.DISCORD_WEBHOOK_URL) {
              core.warning('DISCORD_WEBHOOK_URL not set, skipping Discord notification.')
              return
            }

            const webhook = process.env.DISCORD_WEBHOOK_URL
            const commitMessage = '${{ steps.commit_info.outputs.message }}'
            const commitAuthor = '${{ steps.commit_info.outputs.author }}'
            const commitHash = '${{ steps.commit_info.outputs.hash }}'
            const commitUrl = '${{ steps.commit_info.outputs.url }}'
            const branchName = '${{ steps.commit_info.outputs.branch }}'
            const filesChanged = '${{ steps.changed_files.outputs.count }}'
            const filesList = `${{ steps.changed_files.outputs.list }}`

            const embed = {
              title: `🚀 New Push to \`${branchName}\``,
              description: `**${commitMessage}**`,
              color: 3447003,
              fields: [
                { name: '👤 Author', value: commitAuthor, inline: true },
                { name: '📝 Commit', value: `[\`${commitHash}\`](${commitUrl})`, inline: true },
                { name: '📂 Files Changed', value: `${filesChanged} files`, inline: true },
                { name: '📄 Modified Files', value: filesList || 'No files listed', inline: false }
              ],
              footer: { text: 'OpenCodeKit Template' },
              timestamp: new Date().toISOString()
            }

            const response = await fetch(webhook, {
              method: 'POST',
              headers: { 'Content-Type': 'application/json' },
              body: JSON.stringify({ embeds: [embed] })
            })

            if (!response.ok) {
              const error = await response.text()
              core.error(`Discord webhook failed: ${response.status} - ${error}`)
            } else {
              core.info('✅ Discord notification sent')
            }

      - name: Notify Discord (PR Opened)
        if: github.event_name == 'pull_request' && github.event.action == 'opened'
        uses: actions/github-script@v7
        env:
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            if (!process.env.DISCORD_WEBHOOK_URL) {
              core.warning('DISCORD_WEBHOOK_URL not set')
              return
            }

            const webhook = process.env.DISCORD_WEBHOOK_URL
            const pr = context.payload.pull_request

            const embed = {
              title: '🔀 New Pull Request Opened',
              description: `**${pr.title}**`,
              url: pr.html_url,
              color: 15844367,
              fields: [
                { name: '👤 Author', value: pr.user.login, inline: true },
                { name: '🌿 Branch', value: `\`${pr.head.ref}\` → \`${pr.base.ref}\``, inline: false }
              ],
              footer: { text: 'OpenCodeKit Template' },
              timestamp: new Date().toISOString()
            }

            const response = await fetch(webhook, {
              method: 'POST',
              headers: { 'Content-Type': 'application/json' },
              body: JSON.stringify({ embeds: [embed] })
            })

            if (!response.ok) {
              core.error(`Discord webhook failed: ${response.status}`)
            } else {
              core.info('✅ Discord notification sent')
            }

      - name: Notify Discord (PR Closed/Merged)
        if: github.event_name == 'pull_request' && github.event.action == 'closed'
        uses: actions/github-script@v7
        env:
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            if (!process.env.DISCORD_WEBHOOK_URL) {
              core.warning('DISCORD_WEBHOOK_URL not set')
              return
            }

            const webhook = process.env.DISCORD_WEBHOOK_URL
            const pr = context.payload.pull_request

            const title = pr.merged ? '✅ Pull Request Merged' : '❌ Pull Request Closed'
            const color = pr.merged ? 5763719 : 15158332
            const mergedInfo = pr.merged ? [{ name: '👤 Merged by', value: pr.merged_by?.login || 'Unknown', inline: true }] : []

            const embed = {
              title: title,
              description: `**${pr.title}**`,
              url: pr.html_url,
              color: color,
              fields: [
                ...mergedInfo,
                { name: '🌿 Branch', value: `\`${pr.head.ref}\` → \`${pr.base.ref}\``, inline: false }
              ],
              footer: { text: 'OpenCodeKit Template' },
              timestamp: new Date().toISOString()
            }

            const response = await fetch(webhook, {
              method: 'POST',
              headers: { 'Content-Type': 'application/json' },
              body: JSON.stringify({ embeds: [embed] })
            })

            if (!response.ok) {
              core.error(`Discord webhook failed: ${response.status}`)
            } else {
              core.info('✅ Discord notification sent')
            }
